- 
  action: "add_pipelines"
  pipelines: 
    pl1: 
      f1:
        type: "slice"
        params: 
          point: 
            x: 0.5
            y: 0.5
            z: 0.5
          normal: 
            x: 0.0
            y: 0.0
            z: 1.0
- 
  action: "add_extracts"
  extracts: 
    e1: 
      type: "volume"
      params: 
        field: "gasDensity"
        filename: "volume%05d"
    e3:
      type: "relay"
      params:
        path: "./blueprint"
        protocol: "blueprint/mesh/hdf5"
