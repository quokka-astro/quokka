- 
  action: "add_pipelines"
  pipelines:
    z_slice_pl:
      f1:
        type: "slice"
        params: 
          point: 
            x: 0.5
            y: 0.125
            z: 0.125
          normal: 
            x: 0.0
            y: 0.0
            z: 1.0
    cloudfrac_contour_pl:
      f1: 
        type: "contour"
        params: 
          field: "cloud_fraction"
          iso_values: 0.9
    temp_contour_pl:
      f1: 
        type: "contour"
        params: 
          field: "temperature"
          iso_values: 1.0e4
-
  action: "add_extracts"
  extracts:
    zslice_extract:
      type: "relay"
      pipeline: "z_slice_pl"
      params:
        path: "slices/zslice"
        protocol: "blueprint/mesh/hdf5"
        num_files: 2
    cloudfrac_contour_extract:
      type: "relay"
      pipeline: "cloudfrac_contour_pl"
      params:
        path: "slices/cloudfrac_contour"
        protocol: "blueprint/mesh/hdf5"
        num_files: 2
    temp_contour_extract:
      type: "relay"
      pipeline: "temp_contour_pl"
      params:
        path: "slices/temp_contour"
        protocol: "blueprint/mesh/hdf5"
        num_files: 2
- 
  action: "add_queries"
  queries: 
    max1: 
      params: 
        expression: "max(field('temperature'))"
        name: "max_temperature"
    max2:
      params: 
        expression: "max(field('nH'))"
        name: "max_nH"
    max3:
      params: 
        expression: "max(field('cooling_length'))"
        name: "max_cooling_length"
    max4:
      params: 
        expression: "max(field('pressure'))"
        name: "max_pressure"
    max5:
      params: 
        expression: "max(field('entropy'))"
        name: "max_entropy"
    min1:
      params: 
        expression: "min(field('temperature'))"
        name: "min_temperature"
    min2:
      params: 
        expression: "min(field('nH'))"
        name: "min_nH"
    min3:
      params: 
        expression: "min(field('cooling_length'))"
        name: "min_cooling_length"
    min4:
      params: 
        expression: "min(field('pressure'))"
        name: "min_pressure"
    min5:
      params: 
        expression: "min(field('entropy'))"
        name: "min_entropy"
    hist1:
      params:
        expression: "binning('mass', 'sum', [axis('lab_velocity_x', num_bins=50, min_val=0, max_val=200, clamp=True), axis('temperature', [0., 1.0e4, 1.0e5, 1.0e6, 1.0e7, 1.0e10])])"
