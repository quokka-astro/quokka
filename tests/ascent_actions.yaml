- 
  action: "add_pipelines"
  pipelines:
    z_slice_pl:
      f1:
        type: "slice"
        params: 
          point: 
            x: 0.5
            y: 0.125
            z: 0.125
          normal: 
            x: 0.0
            y: 0.0
            z: 1.0
    cloudfrac_contour_pl:
      f1: 
        type: "contour"
        params: 
          field: "cloud_fraction"
          iso_values: 0.9
    temp_contour_pl:
      f1: 
        type: "contour"
        params: 
          field: "temperature"
          iso_values: 1.0e4
    mass_pl:
      f1:
        type: "expression"
        params:
          expression: "topo('mesh').cell.volume * field('gasDensity')"
          name: "mass"
-
  action: "add_extracts"
  extracts:
    zslice_extract:
      type: "relay"
      pipeline: "z_slice_pl"
      params:
        path: "slices/zslice"
        protocol: "blueprint/mesh/hdf5"
        num_files: 2
    cloudfrac_contour_extract:
      type: "relay"
      pipeline: "cloudfrac_contour_pl"
      params:
        path: "slices/cloudfrac_contour"
        protocol: "blueprint/mesh/hdf5"
        num_files: 2
    temp_contour_extract:
      type: "relay"
      pipeline: "temp_contour_pl"
      params:
        path: "slices/temp_contour"
        protocol: "blueprint/mesh/hdf5"
        num_files: 2
- 
  action: "add_queries"
  queries: 
    q1: 
      params: 
        expression: "max(field('temperature'))"
        name: "max_temperature"
    q2:
      params: 
        expression: "max(field('nH'))"
        name: "max_nH"
    q3:
      params: 
        expression: "max(field('cooling_length'))"
        name: "max_cooling_length"
    q4:
      params: 
        expression: "min(field('temperature'))"
        name: "min_temperature"
    q5:
      params: 
        expression: "min(field('nH'))"
        name: "min_nH"
    q6:
      params: 
        expression: "min(field('cooling_length'))"
        name: "min_cooling_length"
    hist1: # TODO: explicitly specify bins
      params:
        expression: "binning('mass', 'sum', [axis('x-velocity', num_bins=32), axis('temperature', num_bins=32)])"
        name: "hist_velocity_temp"
      pipeline: x_velocity_pl
    hist2: # TODO: explicitly specify bins
      params:
        expression: "binning('mass', 'sum', [axis('x-velocity', num_bins=32), axis('nH', num_bins=32)])"
        name: "hist_velocity_nH"
      pipeline: x_velocity_pl
- 
  action: "save_session"
